  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nv(safe-area-inset-bottom));box-shadow:0 -6px 20px rgba(47,43,61,.06)\">\n       <div style=\"width:100%;max-width:620px;margin:0 auto\">\n        <sc-if value=\"{{ showTotalBar }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;background:#EEEBFD;border-radius:14px;padding:10px 14px;margin-bottom:10px\">\n            <div style=\"font-size:12px;color:#5e52d6;font-weight:700\">{{ barSub }}<\u002Fdiv>\n            <div style=\"font-size:18px;font-weight:800;color:#5e52d6\">{{ barMain }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ hasChips }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end\">\n            <sc-for list=\"{{ chips }}\" as=\"ch\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ ch.onClick }}\" style=\"{{ ch.style }}\" style-hover=\"filter:brightness(.97)\">{{ ch.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showHint }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;font-size:12.5px;color:#a8a6b0;font-weight:600;padding:6px 0\">👆 Toque em uma opção acima para continuar<\u002Fdiv>\n        <\u002Fsc-if>\n       <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isTotem }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;align-items:center;margin-top:-18px\">\n      <div style=\"width:150px;height:110px;background:linear-gradient(90deg,#1f2126,#3a3d45 50%,#1f2126)\"><\u002Fdiv>\n      <div style=\"width:360px;height:20px;border-radius:10px;background:#1a1c20;box-shadow:0 14px 30px rgba(0,0,0,.35)\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 720, &quot;height&quot;: 1000}, &quot;device&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;mobile&quot;, &quot;tablet&quot;, &quot;totem&quot;], &quot;default&quot;: &quot;mobile&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Dispositivo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.nextId = 1;\n    this.scrollRef = React.createRef();\n    this.state = this.buildInitial();\n  }\n\n  buildInitial() {\n    this.nextId = 100;\n    const comandas = [\n      { id: 'c1', name: 'Comanda 01', person: 'João', emoji: '🍲', thumbBg: '#FFF1E6', summary: '2 pratos · 3 bebidas', subtotalCents: 13600,\n        items: [\n          { emoji: '🍲', name: 'Feijoada individual', qty: 1, cents: 4600 },\n          { emoji: '🥩', name: 'Picanha na chapa', qty: 1, cents: 6400 },\n          { emoji: '🍺', name: 'Chopp 300ml', qty: 2, cents: 1800 },\n          { emoji: '🥤', name: 'Guaraná lata', qty: 1, cents: 800 },\n        ] },\n      { id: 'c2', name: 'Comanda 02', person: 'Maria', emoji: '🦐', thumbBg: '#FDECEF', summary: '1 prato · 3 bebidas', subtotalCents: 10200,\n        items: [\n          { emoji: '🦐', name: 'Moqueca de camarão', qty: 1, cents: 7200 },\n          { emoji: '🍹', name: 'Caipirinha', qty: 2, cents: 2400 },\n          { emoji: '💧', name: 'Água com gás', qty: 1, cents: 600 },\n        ] },\n      { id: 'c3', name: 'Comanda 03', person: 'Ana', emoji: '🍚', thumbBg: '#EAF3FF', summary: '1 prato · 1 sobremesa · 1 bebida', subtotalCents: 8000,\n        items: [\n          { emoji: '🍚', name: 'Risoto de funghi', qty: 1, cents: 5200 },\n          { emoji: '🍊', name: 'Suco de laranja', qty: 1, cents: 1200 },\n          { emoji: '🍮', name: 'Pudim de leite', qty: 1, cents: 1600 },\n        ] },\n    ].map(c => ({ ...c, selected: false, paid: false }));\n\n    return {\n      comandas,\n      tipPct: 0,\n      copied: false,\n      typing: false,\n      device: (this.state && this.state.device) || this.props.device || 'mobile',\n      screen: 'splash',\n      stage: 'splash',\n      msgs: [],\n    };\n  }\n\n  fmt(cents) {\n    const v = (cents / 100).toFixed(2).split('.');\n    const int = v[0].replace(/\\B(?=(\\d{3})+(?!\\d))/g, '.');\n    return 'R$ ' + int + ',' + v[1];\n  }\n\n  scrollBottom() {\n    const el = this.scrollRef && this.scrollRef.current;\n    if (el) requestAnimationFrame(() => { el.scrollTop = el.scrollHeight + 400; });\n  }\n  componentDidMount() { this.scrollBottom(); }\n  componentDidUpdate() { this.scrollBottom(); }\n\n  append(msg) {\n    this.setState(s => ({ msgs: [...s.msgs, { id: this.nextId++, ...msg }] }));\n  }\n\n  // reply with a short \"typing\" pause before assistant messages\n  botSay(cb) {\n    this.setState({ typing: true });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => { this.setState({ typing: false }); cb(); }, 650);\n  }\n\n  selectedList() { return this.state.comandas.filter(c => c.selected && !c.paid); }\n\n  toggleComanda(id) {\n    this.setState(s => ({ comandas: s.comandas.map(c => (c.id === id && !c.paid) ? { ...c, selected: !c.selected } : c) }));\n  }\n  appendDetail(id) { this.append({ kind: 'detail', side: 'a', comandaId: id }); }\n\n  // ---- flow ----\n  chip(action) {\n    const map = {\n      lerOutro: () => this.lerOutro(),\n      irPagamento: () => this.irPagamento(),\n      tipSim: () => this.setTip(10, 'Sim, incluir os 10%'),\n      tipNao: () => this.setTip(0, 'Pode ir sem taxa'),\n      tipOutro: () => this.setTip(5, 'Outro valor: 5%'),\n      pagarRestante: () => this.pagarRestante(),\n      encerrar: () => this.encerrar(),\n      email: () => this.endAction('Enviar por e-mail', '📧', '#eaf3ff', 'Comprovante enviado para joao@email.com ✅'),\n      baixar: () => this.endAction('Baixar comprovante', '⬇️', '#F1EEFE', 'Comprovante salvo no seu celular ✅'),\n      novo: () => this.setState(this.buildInitial()),\n    };\n    (map[action] || (() => {}))();\n  }\n\n  startChat() {\n    this.setState({ screen: 'chat', stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji: '🍽️', emojiBg: '#F1EEFE', text: \"Olá! Bem-vindo(a) ao Durango Burger's. Sou a Zeca e vou fechar sua conta em segundos. 😊\" });\n      this.append({ kind: 'text', side: 'a', text: 'Para começar, aponte a câmera para o código de barras do seu cartão de consumo. É ele que identifica sua mesa e sua comanda 👇' });\n      this.append({ kind: 'scanner', side: 'a' });\n      this.setState({ stage: 'scan' });\n    });\n  }\n\n  scanNext() {\n    if (this.state.stage !== 'scan') return;\n    const next = this.state.comandas.find(c => !c.selected && !c.paid);\n    if (!next) return;\n    this.setState({ stage: 'loading', typing: true });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => {\n      const firstRead = !this.state.comandas.some(c => c.selected || c.paid);\n      this.setState(st => ({ typing: false, comandas: st.comandas.map(c => c.id === next.id ? { ...c, selected: true } : c) }));\n      if (firstRead) {\n        this.append({ kind: 'text', side: 'a', emoji: '📍', emojiBg: '#F1EEFE', text: 'Cartão lido! Identificamos sua mesa: Mesa 12 🪑' });\n        this.append({ kind: 'mesa', side: 'a' });\n      }\n      this.append({ kind: 'cardRead', side: 'a', comandaId: next.id });\n      const remaining = this.state.comandas.filter(c => !c.selected && !c.paid && c.id !== next.id).length;\n      this.append({ kind: 'text', side: 'a', emoji: '✅', emojiBg: '#F1EEFE', text: (firstRead ? '' : 'Cartão lido! ') + (remaining > 0 ? 'Deseja adicionar mais cartões da mesa?' : 'Esse foi o último cartão em aberto da mesa.') });\n      this.setState({ stage: 'addMore' });\n    }, 900);\n  }\n\n  lerOutro() {\n    this.append({ kind: 'text', side: 'c', text: 'Ler outro cartão' });\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', text: 'Beleza! Aponte para o próximo código de barras 👇' });\n      this.append({ kind: 'scanner', side: 'a' });\n      this.setState({ stage: 'scan' });\n    });\n  }\n\n  irPagamento() {\n    const sel = this.selectedList();\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    this.append({ kind: 'text', side: 'c', text: 'Ir para o pagamento · ' + this.fmt(cents) });\n    this.askTip();\n  }\n\n  askTip() {\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji: '💜', emojiBg: '#F1EEFE', text: 'Deseja incluir os 10% de serviço (gorjeta)?', sub: 'É opcional e vai direto para a equipe que te atendeu.' });\n      this.setState({ stage: 'tip' });\n    });\n  }\n\n  setTip(pct, echo) {\n    this.setState({ tipPct: pct });\n    this.append({ kind: 'text', side: 'c', text: echo });\n    const sel = this.selectedList();\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    const tip = Math.round(cents * pct / 100);\n    const grand = cents + tip;\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji: '💳', emojiBg: '#eaf3ff', text: 'Como você quer pagar os ' + this.fmt(grand) + '?', sub: pct ? ('Inclui ' + this.fmt(tip) + ' de serviço.') : 'Sem taxa de serviço.' });\n      this.append({ kind: 'methods', side: 'a' });\n      this.setState({ stage: 'payment' });\n    });\n  }\n\n  selectMethod(pm) {\n    this.append({ kind: 'text', side: 'c', text: pm.label });\n    const sel = this.selectedList();\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    const grand = cents + Math.round(cents * this.state.tipPct / 100);\n    if (pm.key === 'pix') {\n      this.setState({ stage: 'loading', copied: false });\n      this.botSay(() => {\n        this.append({ kind: 'text', side: 'a', emoji: '📲', emojiBg: '#F1EEFE', text: 'Pronto! Escaneie o QR Code ou copie o código Pix 👇' });\n        this.append({ kind: 'pix', side: 'a', amountCents: grand });\n        this.setState({ stage: 'pix' });\n      });\n    } else {\n      this.setState({ stage: 'loading' });\n      this.botSay(() => {\n        this.append({ kind: 'text', side: 'a', emoji: '⏳', emojiBg: '#fff4e6', text: 'Processando o pagamento no ' + pm.label + '...' });\n        setTimeout(() => this.finishPayment(), 900);\n      });\n    }\n  }\n\n  finishPayment() {\n    const comandas = this.state.comandas;\n    const sel = comandas.filter(c => c.selected && !c.paid);\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    const grand = cents + Math.round(cents * this.state.tipPct / 100);\n    const names = sel.map(c => ({ name: c.name }));\n    const newComandas = comandas.map(c => (c.selected && !c.paid) ? { ...c, paid: true, selected: false } : c);\n    this.setState({ comandas: newComandas, tipPct: 0, stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'success', side: 'a', amountCents: grand, names });\n      const remaining = newComandas.filter(c => !c.paid);\n      if (remaining.length > 0) {\n        this.append({ kind: 'text', side: 'a', emoji: '🧾', emojiBg: '#fff4e6', text: 'Ainda há ' + remaining.length + (remaining.length > 1 ? ' comandas' : ' comanda') + ' em aberto na mesa. Quer pagar agora?' });\n        this.setState({ stage: 'successRemaining' });\n      } else {\n        this.append({ kind: 'text', side: 'a', emoji: '🥳', emojiBg: '#F1EEFE', text: 'Tudo certo! Sua mesa está totalmente quitada.' });\n        this.setState({ stage: 'successDone' });\n      }\n    });\n  }\n\n  pagarRestante() {\n    const comandas = this.state.comandas.map(c => c.paid ? c : { ...c, selected: true });\n    const sel = comandas.filter(c => !c.paid);\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    this.setState({ comandas, tipPct: 0 });\n    this.append({ kind: 'text', side: 'c', text: 'Pagar restante · ' + this.fmt(cents) });\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji: '💜', emojiBg: '#F1EEFE', text: 'Combinado! Deseja incluir os 10% de serviço nessas comandas?' });\n      this.setState({ stage: 'tip' });\n    });\n  }\n\n  encerrar() {\n    this.append({ kind: 'text', side: 'c', text: 'Encerrar' });\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji: '🙏', emojiBg: '#F1EEFE', text: \"Obrigada por vir ao Durango Burger's! Volte sempre 💜\", sub: 'Quer levar o comprovante?' });\n      this.setState({ stage: 'end' });\n    });\n  }\n\n  endAction(echo, emoji, bg, reply) {\n    this.append({ kind: 'text', side: 'c', text: echo });\n    this.setState({ stage: 'loading' });\n    this.botSay(() => {\n      this.append({ kind: 'text', side: 'a', emoji, emojiBg: bg, text: reply });\n      this.setState({ stage: 'end' });\n    });\n  }\n\n  // ---- render decoration ----\n  decorate(m, comandas) {\n    const isA = m.side === 'a';\n    const base = { id: m.id };\n    if (m.kind === 'text') {\n      return { ...base, isText: true, isAssistant: isA, text: m.text, sub: m.sub, hasSub: !!m.sub,\n        emoji: m.emoji, emojiBg: m.emojiBg || '#F1EEFE', hasEmoji: !!m.emoji,\n        rowStyle: isA ? 'display:flex;gap:8px;align-items:flex-start;max-width:90%'\n                      : 'display:flex;justify-content:flex-end',\n        bubbleStyle: isA\n          ? 'background:#fff;border-radius:4px 18px 18px 18px;padding:12px 14px;box-shadow:0 2px 10px rgba(47,43,61,.07)'\n          : 'background:#ECE7FF;border-radius:18px 18px 4px 18px;padding:12px 14px;max-width:82%;box-shadow:0 2px 8px rgba(115,103,240,.12)' };\n    }\n    if (m.kind === 'mesa') return { ...base, isMesa: true };\n    if (m.kind === 'comandas') {\n      return { ...base, isComandas: true, comandas: comandas.map(c => this.decorateComanda(c)) };\n    }\n    if (m.kind === 'detail') {\n      const c = comandas.find(x => x.id === m.comandaId) || comandas[0];\n      return { ...base, isDetail: true, detail: {\n        name: c.name, person: c.person, totalLabel: this.fmt(c.subtotalCents),\n        items: c.items.map(it => ({ emoji: it.emoji, name: it.name,\n          qtyLabel: it.qty + ' un · ' + this.fmt(it.cents / it.qty) + ' cada',\n          priceLabel: this.fmt(it.cents) })) } };\n    }\n    if (m.kind === 'methods') {\n      const defs = [\n        { key: 'pix', label: 'Pix', desc: 'Aprovação na hora', icon: '⚡', iconBg: '#F1EEFE' },\n        { key: 'credito', label: 'Crédito', desc: 'Em até 12x', icon: '💳', iconBg: '#eaf3ff' },\n        { key: 'debito', label: 'Débito', desc: 'À vista', icon: '🏧', iconBg: '#f3edff' },\n        { key: 'carteira', label: 'Carteira', desc: 'Apple / Google Pay', icon: '📱', iconBg: '#fff4e6' },\n      ];\n      return { ...base, isMethods: true, methods: defs.map(d => ({ ...d, onClick: () => this.selectMethod(d) })) };\n    }\n    if (m.kind === 'pix') {\n      return { ...base, isPix: true, amountLabel: this.fmt(m.amountCents),\n        copyLabel: this.state.copied ? 'Código copiado ✓' : 'Copiar código Pix',\n        onCopy: () => { try { navigator.clipboard && navigator.clipboard.writeText('00020126BR.GOV.BCB.PIX' + m.amountCents); } catch (e) {} this.setState({ copied: true }); },\n        onConfirm: () => this.finishPayment() };\n    }\n    if (m.kind === 'success') {\n      return { ...base, isSuccess: true, amountLabel: this.fmt(m.amountCents), names: m.names };\n    }\n    if (m.kind === 'scanner') {\n      return { ...base, isScanner: true, onScan: () => this.scanNext() };\n    }\n    if (m.kind === 'cardRead') {\n      const c = comandas.find(x => x.id === m.comandaId) || comandas[0];\n      return { ...base, isCardRead: true, cr: {\n        emoji: c.emoji, name: c.name, person: c.person, summary: c.summary,\n        subtotalLabel: this.fmt(c.subtotalCents),\n        thumbStyle: 'width:46px;height:46px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:25px;background:' + c.thumbBg,\n        onDetail: (e) => { if (e) e.stopPropagation(); this.appendDetail(c.id); } } };\n    }\n    return base;\n  }\n\n  decorateComanda(c) {\n    const selected = c.selected && !c.paid;\n    const border = c.paid ? '#ECEBF1' : (selected ? '#7367F0' : '#ECEBF1');\n    const bg = c.paid ? '#F6F6F8' : '#fff';\n    const shadow = selected ? '0 8px 20px rgba(115,103,240,.2)' : '0 2px 10px rgba(47,43,61,.05)';\n    return {\n      id: c.id, name: c.name, person: c.person, emoji: c.emoji, summary: c.paid ? 'Pago ✓' : c.summary,\n      subtotalLabel: this.fmt(c.subtotalCents),\n      checkMark: (selected || c.paid) ? '✓' : '',\n      cardStyle: 'display:flex;align-items:center;gap:11px;padding:12px;border-radius:16px;background:' + bg + ';cursor:' + (c.paid ? 'default' : 'pointer') + ';transition:all .18s;border:2px solid ' + border + ';box-shadow:' + shadow + ';opacity:' + (c.paid ? '.6' : '1'),\n      checkStyle: 'width:24px;height:24px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;transition:all .18s;background:' + ((selected || c.paid) ? '#7367F0' : '#fff') + ';border:2px solid ' + ((selected || c.paid) ? '#7367F0' : '#DcdbE1'),\n      thumbStyle: 'width:46px;height:46px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:25px;background:' + c.thumbBg,\n      onToggle: () => { if (!c.paid) this.toggleComanda(c.id); },\n      onDetail: (e) => { if (e) e.stopPropagation(); this.appendDetail(c.id); },\n    };\n  }\n\n  chipStyle(primary) {\n    return primary\n      ? 'background:#7367F0;color:#fff;font-weight:800;font-size:13.5px;padding:11px 18px;border-radius:22px;cursor:pointer;box-shadow:0 6px 16px rgba(115,103,240,.35)'\n      : 'background:#fff;color:#7367F0;font-weight:800;font-size:13.5px;padding:11px 18px;border-radius:22px;cursor:pointer;border:1.5px solid #cfc8fb';\n  }\n\n  renderVals() {\n    const s = this.state;\n    const stage = s.stage;\n    const remainingToScan = s.comandas.filter(c => !c.selected && !c.paid).length;\n    const defs = {\n      tip: [['Sim, incluir 10%', 'tipSim', true], ['Sem taxa', 'tipNao', false], ['Outro valor', 'tipOutro', false]],\n      successRemaining: [['Pagar restante', 'pagarRestante', true], ['Encerrar', 'encerrar', false]],\n      successDone: [['Encerrar', 'encerrar', true]],\n      end: [['Enviar por e-mail', 'email', false], ['Baixar comprovante', 'baixar', false], ['Novo pagamento', 'novo', true]],\n    };\n    let list = defs[stage] || [];\n    if (stage === 'addMore') {\n      list = remainingToScan > 0\n        ? [['Ler outro cartão', 'lerOutro', false], ['Ir para pagamento', 'irPagamento', true]]\n        : [['Ir para pagamento', 'irPagamento', true]];\n    }\n    const chips = list.map(([label, action, primary]) => ({ label, style: this.chipStyle(primary), onClick: () => this.chip(action) }));\n\n    const sel = this.selectedList();\n    const cents = sel.reduce((a, c) => a + c.subtotalCents, 0);\n    const tip = Math.round(cents * s.tipPct / 100);\n    const grand = cents + tip;\n    const showTotalBar = ['addMore', 'tip', 'payment', 'pix'].includes(stage) && sel.length > 0;\n\n    const device = s.device || 'mobile';\n    const frames = {\n      mobile: { w: 412, h: 868, pad: 11, rOut: 46, rIn: 36, bg: '#1a1d1c', zoom: 1 },\n      tablet: { w: 660, h: 860, pad: 17, rOut: 36, rIn: 22, bg: '#1a1d1c', zoom: 1 },\n      totem:  { w: 600, h: 740, pad: 15, rOut: 22, rIn: 12, bg: '#15161a', zoom: 1.06 },\n    };\n    const f = frames[device];\n    const devDefs = [\n      { key: 'mobile', label: 'Mobile', icon: '📱' },\n      { key: 'tablet', label: 'Tablet', icon: '💻' },\n      { key: 'totem', label: 'Autoatendimento', icon: '🏧' },\n    ];\n    const devices = devDefs.map(d => ({\n      label: d.label, icon: d.icon,\n      onClick: () => this.setState({ device: d.key }),\n      style: 'display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;' + (device === d.key ? 'background:#7367F0;color:#fff;box-shadow:0 6px 14px rgba(115,103,240,.35)' : 'color:#6d6b78'),\n    }));\n\n    return {\n      scrollRef: this.scrollRef,\n      typing: s.typing,\n      devices,\n      isTotem: device === 'totem',\n      showStatusBar: device !== 'totem',\n      frameStyle: 'width:' + f.w + 'px;max-width:100%;height:' + f.h + 'px;background:' + f.bg + ';border-radius:' + f.rOut + 'px;padding:' + f.pad + 'px;box-shadow:0 30px 80px rgba(26,29,28,.35), 0 6px 20px rgba(26,29,28,.2)' + (device === 'totem' ? ';border:1px solid #2c2e35' : ''),\n      screenStyle: 'position:relative;width:100%;height:100%;background:#F8F7FA;border-radius:' + f.rIn + 'px;overflow:hidden;display:flex;flex-direction:column;zoom:' + f.zoom,\n      topSub: s.comandas.some(c => c.selected || c.paid) ? 'Mesa 12 · Zeca está online' : 'Zeca está online',\n      showSplash: s.screen === 'splash',\n      startChat: () => this.startChat(),\n      msgs: s.msgs.map(m => this.decorate(m, s.comandas)),\n      chips,\n      hasChips: chips.length > 0 && !s.typing,\n      showHint: !s.typing && (stage === 'scan' || stage === 'payment' || stage === 'pix'),\n      showTotalBar,\n      barMain: this.fmt(grand),\n      barSub: sel.length + (sel.length > 1 ? ' cartões' : ' cartão') + (s.tipPct ? (' · +' + this.fmt(tip) + ' serviço') : ''),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
