name: constel_pay
description: Terminal de autoatendimento para pagamento de consumo em restaurantes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2
  logger: ^2.5.0
  intl: any
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1
  crypto: ^3.0.6
  qr_flutter: ^4.1.0
  video_player: ^2.9.2
  file_picker: ^8.1.6
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
