name: constel_pay
description: Terminal de autoatendimento para pagamento de consumo em restaurantes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2
  logger: ^2.5.0
  intl: any
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  crypto: ^3.0.6
  collection: ^1.19.0
  qr_flutter: ^4.1.0
  video_player: ^2.9.2
  # 11.x e o minimo que compila no Android: o 8.x fixava compileSdk 34 no
  # proprio modulo e o flutter_plugin_android_lifecycle exige 36.
  file_picker: ^11.0.2
  flutter_svg: ^2.0.17
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  video_player_win: ^3.2.2
  # Modo totem no Windows: tela cheia, sem barra/botões, sempre no topo.
  window_manager: ^0.4.3
  # Leitura por câmera no Android (fallback do leitor de código de barras).
  # Preso no 6.x de proposito: o 7.x exige Flutter >= 3.29 e a stack alvo do
  # projeto e Flutter 3.22 / Dart 3.4.
  mobile_scanner: ^6.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/marca/
    - assets/bandeiras/
  # Fontes empacotadas: o terminal funciona sem internet.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fontes/Inter-400.ttf
        - asset: assets/fontes/Inter-600.ttf
          weight: 600
        - asset: assets/fontes/Inter-700.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fontes/Roboto-400.ttf
        - asset: assets/fontes/Roboto-600.ttf
          weight: 600
        - asset: assets/fontes/Roboto-700.ttf
          weight: 700
    - family: Open Sans
      fonts:
        - asset: assets/fontes/OpenSans-400.ttf
        - asset: assets/fontes/OpenSans-600.ttf
          weight: 600
        - asset: assets/fontes/OpenSans-700.ttf
          weight: 700
    - family: Lato
      fonts:
        - asset: assets/fontes/Lato-400.ttf
        - asset: assets/fontes/Lato-700.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fontes/Montserrat-400.ttf
        - asset: assets/fontes/Montserrat-600.ttf
          weight: 600
        - asset: assets/fontes/Montserrat-700.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fontes/Poppins-400.ttf
        - asset: assets/fontes/Poppins-600.ttf
          weight: 600
        - asset: assets/fontes/Poppins-700.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fontes/Nunito-400.ttf
        - asset: assets/fontes/Nunito-600.ttf
          weight: 600
        - asset: assets/fontes/Nunito-700.ttf
          weight: 700
    - family: Rubik
      fonts:
        - asset: assets/fontes/Rubik-400.ttf
        - asset: assets/fontes/Rubik-600.ttf
          weight: 600
        - asset: assets/fontes/Rubik-700.ttf
          weight: 700

# Icone do app (Android e Windows). Para regerar:
#   flutter test tool/gerar_icone_app.dart   -> rasteriza o SVG em PNG
#   dart run flutter_launcher_icons          -> gera os icones das plataformas
flutter_launcher_icons:
  image_path: assets/marca/icone_app.png
  android: true
  min_sdk_android: 21
  remove_alpha_ios: false
  windows:
    generate: true
    image_path: assets/marca/icone_app.png
    icon_size: 256
